<!-- ============================================================
     SLIDE 모듈 HTML — 슬라이드 핸드북 (LIVE 모듈 확장)
     삽입 위치 3곳:
       (A) 수강생 미니 패널  → <aside class="toc"> 시작 직후, <div class="topbar"> 바로 위
       (B) SLIDES 매핑 데이터 → <body> 안 아무 곳(아래 slide-sync.js 보다 먼저 로드되면 됨)
       (C) 발표 오버레이+라이트박스 → <body> 직속, .layout 닫는 </div> 다음
     그리고 <body class="..."> 에 has-slides 클래스를 추가한다.
     ============================================================ -->

<!-- (A) 수강생 미니 슬라이드 패널 -->
<div id="slide-mini" class="slide-mini" aria-live="polite">
  <div class="sm-head">
    <span class="sm-dot"></span><span>강사 진행</span><span class="sm-num" id="sm-num">–</span>
  </div>
  <button type="button" class="sm-frame" id="sm-frame" title="크게 보기">
    <img id="sm-img" alt="현재 슬라이드">
    <div class="sm-empty" id="sm-empty">강사가 발표를<br>시작하면 표시됩니다</div>
  </button>
</div>

<!-- (B) 슬라이드 ↔ 섹션 매핑 — 빌드 시 채운다.
     img: slides/NN.png 상대경로 · section: 점프할 본문 앵커 id(없으면 null) -->
<script>
window.SLIDES = [
  { img: "slides/01.png", section: "section-1" },
  { img: "slides/02.png", section: "section-1" },
  { img: "slides/03.png", section: "section-2" },
  { img: "slides/04.png", section: null }
];
</script>

<!-- (C) 발표 모드 오버레이 + 확대 라이트박스 -->
<div id="present-overlay" class="present-overlay" aria-hidden="true">
  <div class="po-stage">
    <button type="button" class="po-nav po-prev" id="po-prev" aria-label="이전 슬라이드">‹</button>
    <img id="po-img" alt="발표 슬라이드">
    <button type="button" class="po-nav po-next" id="po-next" aria-label="다음 슬라이드">›</button>
  </div>
  <div class="po-bar">
    <span class="po-count" id="po-count">– / –</span>
    <span class="po-section" id="po-section"></span>
    <span class="po-auth need" id="po-auth">로그인 필요 — 클릭</span>
    <button type="button" class="po-exit" id="po-exit" title="발표 종료 (Esc)">✕ 종료</button>
  </div>
</div>

<div id="slide-lightbox" class="slide-lightbox" aria-hidden="true">
  <img id="lb-img" alt="슬라이드 확대">
</div>
